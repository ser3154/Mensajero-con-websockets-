<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente WebSocket</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
    <script src="index.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <h3 class="text-center mb-4 text-purple">Mensajero WebSocket</h3>
        <div id="mensajes" class="chat-box mb-3">
            <ul id="ULMensajes"></ul>
        </div>
        
        <div class="card p-3 shadow-sm">
            <div class="row g-2">
                <div class="col-4">
                    <input type="text" id="txtNombre" class="form-control" placeholder="Tu Nombre">
                </div>
                <div class="col-6">
                    <input type="text" id="txtMensaje" class="form-control" placeholder="Escribe un mensaje...">
                </div>
                <div class="col-2">
                    <button id="btnEnviar" class="btn btn-purple w-100">Enviar</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
